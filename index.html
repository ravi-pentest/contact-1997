<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <form id="my-form">
        <h3>ඔබේ තොරතුරු 1997 අපිට කියන්න</h3>
        <input type="text" name="name" placeholder="නම">
        <input type="email" name="email" placeholder="ඊමේල්">
        <textarea name="message" placeholder="පණිවිඩය" required></textarea>
        
        <input type="hidden" name="ip_address" id="ip">
        <input type="hidden" name="device_info" id="device">
        
        <button type="submit" id="btn">යොමු කරන්න</button>
        <p id="msg" style="display:none; color:green;">ලැබුණා! ස්තූතියි.</p>
    </form>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxKARvASkNSUx6dBrHlxnx3Z7B11IVr2zPa5ehxPUKk-WAYjT6q3kkDSALkV0h3w68xIw/exec';
        const form = document.getElementById('my-form');

        // IP සහ Device දත්ත ගැනීම
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            document.getElementById('ip').value = d.ip;
            document.getElementById('device').value = navigator.userAgent;
        });

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btn').innerText = "යවමින්...";
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                document.getElementById('msg').style.display = "block";
                document.getElementById('btn').innerText = "යොමු කරන්න";
                form.reset();
            })
            .catch(err => alert("Error!"));
        });
    </script>
</body>
</html>
