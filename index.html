<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | 1997</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
        }
        h3 { text-align: center; color: #333; margin-bottom: 20px; }
        input, textarea { 
            width: 100%; 
            margin-bottom: 15px; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: background 0.3s;
        }
        button:disabled { background-color: #ccc; }
        #msg { 
            text-align: center; 
            margin-top: 15px; 
            padding: 10px; 
            border-radius: 6px; 
            display: none; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <form id="contact-form">
        <h3>ඔබේ තොරතුරු අපිට කියන්න</h3>
        
        <input type="text" name="name" placeholder="ඔබේ නම">
        <input type="email" name="email" placeholder="ඊමේල් ලිපිනය">
        <textarea name="message" rows="4" placeholder="පණිවිඩය මෙහි ලියන්න..." required></textarea>
        
        <input type="hidden" name="ip_address" id="ip_field">
        <input type="hidden" name="device_info" id="device_field">
        
        <button type="submit" id="submit-btn">යොමු කරන්න</button>
        <div id="msg"></div>
    </form>
</div>

<script>
    // ඔබේ අලුත්ම Google Script URL එක මෙතැනට දාන්න
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzm7vIVaHYpZy2qQRjV7GdzqKY7gHLDazTf21wmdZV4Q9C4ffIoDnpQ_czOTBbP0RTeMA/exec';
    const form = document.getElementById('contact-form');
    const btn = document.getElementById('submit-btn');
    const msgBox = document.getElementById('msg');

    // IP සහ Device තොරතුරු ලබා ගැනීම
    async function fetchTrackerData() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ip_field').value = data.ip;
            document.getElementById('device_field').value = navigator.userAgent;
        } catch (error) {
            document.getElementById('ip_field').value = "Unknown";
            document.getElementById('device_field').value = navigator.userAgent;
        }
    }
    fetchTrackerData();

        btn.disabled = true;
        btn.innerText = "යවමින් පවතී...";
