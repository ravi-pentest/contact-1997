<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #status-msg { text-align: center; margin-top: 10px; font-weight: bold; display: none; padding: 10px; border-radius: 5px; }
        label { font-size: 13px; color: #555; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center">ඔබේ තොරතුරු අපිට කියන්න</h2>
    <form id="contactForm">
        <input type="text" name="name" placeholder="ඔබේ නම (අත්‍යවශ්‍ය නැත)">
        <input type="text" name="email" placeholder="ඊමේල් ලිපිනය (අත්‍යවශ්‍ය නැත)">
        <textarea name="message" rows="4" placeholder="පණිවිඩය මෙහි ලියන්න..." required></textarea>

        <label>ගොනුවක් ඇමුණුම් කරන්න (අත්‍යවශ්‍ය නැත):</label>
        <input type="file" id="file_input">
        
        <input type="hidden" name="fileData" id="fileData">
        <input type="hidden" name="fileName" id="fileName">
        <input type="hidden" name="ip_address" id="ip_field">
        <input type="hidden" name="device_info" id="device_field">

        <button type="submit" id="submitBtn">යොමු කරන්න</button>
    </form>
    <div id="status-msg"></div>
</div>

<script>
    // ඔබේ අලුත්ම Script URL එක මෙතැනට දාන්න
    const scriptURL = 'https://script.google.com/macros/s/AKfycby2EPKK0ASvGrFZpzw3PW77pzI3Y5IIetxgTkLdpN3aZ1zaKDtR3pawAsudywNh4O5QsA/exec';
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status-msg');

    async function getTrackerData() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            document.getElementById('ip_field').value = data.ip;
            document.getElementById('device_field').value = navigator.userAgent;
        } catch (e) { 
            document.getElementById('ip_field').value = "Not Found";
        }
    }
    getTrackerData();

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "යවමින් (මඳක් රැඳී සිටින්න)...";

        const fileInput = document.getElementById('file_input');
        const file = fileInput.files[0];

        // ගොනුවක් තෝරා ඇත්නම් එය මුලින් කියවා ගත යුතුය
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('fileData').value = event.target.result;
                document.getElementById('fileName').value = file.name;
                sendFormData();
            };
            reader.readAsDataURL(file);
        } else {
            sendFormData();
        }
    });

    function sendFormData() {
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                status.innerText = "පණිවිඩය සාර්ථකව ලැබුණා!";
                status.style.backgroundColor = "#d4edda";
                status.style.color = "#155724";
                status.style.display = "block";
                form.reset();
                getTrackerData();
                btn.disabled = false;
                btn.innerText = "යොමු කරන්න";
                setTimeout(() => status.style.display = "none", 5000);
            })
            .catch(err => {
                status.innerText = "දෝෂයක්! නැවත උත්සාහ කරන්න.";
                status.style.backgroundColor = "#f8d7da";
                status.style.display = "block";
                btn.disabled = false;
                btn.innerText = "යොමු කරන්න";
            });
    }
</script>

</body>
</html>
