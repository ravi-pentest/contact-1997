<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | අපව සම්බන්ධ කර ගන්න</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .contact-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { text-align: center; color: #333; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; }
        #status { 
            text-align: center; 
            margin-top: 15px; 
            font-weight: bold; 
            display: none; 
            padding: 10px; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>

<div class="contact-card">
    <h2>අපට පණිවිඩයක් එවන්න</h2>
    <form id="contact-form">
        <input type="text" name="name" placeholder="ඔබේ නම (අත්‍යවශ්‍ය නැත)">
        <input type="email" name="email" placeholder="ඊමේල් ලිපිනය (අත්‍යවශ්‍ය නැත)">
        
        <textarea name="message" rows="5" placeholder="පණිවිඩය මෙහි ලියන්න..." required></textarea>

        <input type="hidden" name="ip_address" id="ip_address">
        <input type="hidden" name="device_info" id="device_info">

        <button type="submit" id="submit-btn">යොමු කරන්න</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // 1. ඔබේ Google Script URL එක පහත තනි උද්ධෘත ලකුණු (' ') ඇතුළත පේස්ට් කරන්න
    const scriptURL = 'https://script.google.com/macros/s/AKfycby1IMOBFclOChCLS9jTqhZQMuglJ146v-3_uoqHzhxZvDU8NnPWpuDd22EaeRXEYAusrg/exec';
    const form = document.getElementById('contact-form');
    const btn = document.getElementById('submit-btn');
    const statusDiv = document.getElementById('status');

    // පිටුව Load වන විටම IP සහ Device තොරතුරු ලබා ගැනීම
    async function fetchTrackerData() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ip_address').value = data.ip;
            document.getElementById('device_info').value = "OS: " + navigator.platform + " | Browser: " + navigator.userAgent;
        } catch (e) {
            document.getElementById('ip_address').value = "Not Captured";
            document.getElementById('device_info').value = navigator.userAgent;
        }
    }
    fetchTrackerData();

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "යවමින් පවතී...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                statusDiv.innerText = "පණිවිඩය සාර්ථකව ලැබුණා!";
                statusDiv.style.backgroundColor = "#d4edda";
                statusDiv.style.color = "#155724";
                statusDiv.style.display = "block";
                
                form.reset(); // පෝරමය සම්පූර්ණයෙන් හිස් කිරීම
                fetchTrackerData(); // නැවත IP එක සකස් කිරීම
                
                btn.disabled = false;
                btn.innerText = "යොමු කරන්න";
                setTimeout(() => statusDiv.style.display = "none", 5000);
            })
            .catch(err => {
                statusDiv.innerText = "දෝෂයක් සිදු විය! නැවත උත්සාහ කරන්න.";
                statusDiv.style.backgroundColor = "#f8d7da";
                statusDiv.style.color = "#721c24";
                statusDiv.style.display = "block";
                btn.disabled = false;
                btn.innerText = "යොමු කරන්න";
            });
    });
</script>

</body>
</html>
