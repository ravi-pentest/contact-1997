<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #6c757d; }
        #status-msg { text-align: center; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center">පණිවිඩයක් එවන්න</h2>
    <form id="contactForm">
        <input type="text" name="name" placeholder="ඔබේ නම (අත්‍යවශ්‍ය නැත)">
        <input type="email" name="email" placeholder="ඊමේල් ලිපිනය (අත්‍යවශ්‍ය නැත)">
        <textarea name="message" rows="4" placeholder="පණිවිඩය මෙහි ලියන්න..." required></textarea>

        <input type="hidden" name="ip_address" id="ip_field">
        <input type="hidden" name="device_info" id="device_field">

        <button type="submit" id="submitBtn">යොමු කරන්න</button>
    </form>
    <div id="status-msg"></div>
</div>

<script>
    const scriptURL = 'ඔබේ_GOOGLE_SCRIPT_URL_එක_මෙතැනට';
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status-msg');

    // රහසිගතව තොරතුරු ලබා ගැනීම
    async function getSecretData() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            document.getElementById('ip_field').value = data.ip || "Unknown";
            document.getElementById('device_field').value = `${data.city}, ${data.country_name} | ${navigator.userAgent}`;
        } catch (e) {
            document.getElementById('ip_field').value = "Blocked/Error";
            document.getElementById('device_field').value = navigator.userAgent;
        }
    }
    getSecretData();

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "යවමින්...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                status.innerText = "පණිවිඩය සාර්ථකව ලැබුණා!";
                status.style.color = "green";
                status.style.display = "block";
                form.reset();
                getSecretData(); // Reset කළ පසු නැවත IP එක සකසන්න
                btn.disabled = false;
                btn.innerText = "යොමු කරන්න";
                setTimeout(() => status.style.display = "none", 5000);
            })
            .catch(err => {
                status.innerText = "දෝෂයක්! නැවත උත්සාහ කරන්න.";
                status.style.color = "red";
                status.style.display = "block";
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
